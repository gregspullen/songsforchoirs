<!doctype html>
<html lang="en">
<head>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f7faff; /* soft blue tint */
      overflow: hidden;
    }

    .sheet-container {
      display: flex;
      justify-content: center;
      align-items: start;
      height: 90vh;

      height: 100%;

      background: #fff;
    }

      margin: 0.5rem 0 1rem 1rem;
      font-size: 0.9rem;

<body class="sheet">
  <main class="wrap">
    <a href="opus-shepherd.html" class="back-btn">← Back to Opus Page</a>

    <div class="sheet-container">
      <iframe
        src="https://www.songsforchoirs.com/scores/The-Lord-Is-My-Shepherd.pdf#page=2&view=TwoPage&zoom=page-fit"

    </div>
  </main>

  <footer class="site-footer">
