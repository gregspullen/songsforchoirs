<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Benedictus – Songs for Choirs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script>
    const TITLE = "Benedictus";

    const lower = TITLE.toLowerCase();
    const slug = lower.replace(/'/g, "").replace(/\s+/g, "-");
    const encoded = encodeURIComponent(TITLE);

    // Set page title early
    document.title = `${TITLE} – Songs for Choirs`;
  </script>

  <meta name="description" content="Benedictus – an atmospheric and accessible choral setting for SATB choir. View the score, listen, and download licensed copies from Songs for Choirs." />
  <link rel="stylesheet" href="styles.css">

  <!-- Privacy-friendly analytics by Plausible -->
  <script defer data-domain="songsforchoirs.com" src="https://plausible.io/js/script.js"></script>

</head>

<body class="opus-page">
  <header class="site-header">
    <h1 class="site-logo">
      songs<span class="gold">for</span>choirs
    </h1>
    <p class="tagline">New accessible choral music.</p>
  </header>

  <nav id="site-nav" class="site-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="choral.html">Choral</a></li>
      <li><a href="children.html">Children</a></li>
      <li><a href="other.html">Other</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="wrap">
    <section class="panel">

      <div class="score-grid single-opus">
        
        <!-- Left: audio player -->
        <div class="opus-left">
          <audio controls>
            <source id="audioSrc" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
        </div>
        
        <!-- Centre: cover -->
        <figure class="cover">
          <a id="sheetLink" class="cover-link">
            <img 
              id="coverImg"
              onerror="this.classList.add('placeholder'); this.src='images/placeholder.png';">
          </a>
          <span class="hover-tag">VIEW SAMPLE</span>
        </figure>

        <!-- Right: order button -->
        <div class="opus-right">
          <div class="paypal-box">
            <button class="price"
              data-price="1.25"
              id="orderBtn">
              Order Here — £1.25 (<span class="eur"></span>, <span class="usd"></span>) per part
            </button> 
          </div>
        </div>

      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>© 2026 <a href="https://www.songsforchoirs.com">www.songsforchoirs.com</a> — All rights reserved worldwide.</small>
    </div>
  </footer>

  <script src="pricing.js"></script>

  <!-- 🔧 Wiring everything together -->
  <script>
    // Audio
    const audio = document.querySelector("audio");

document.getElementById("audioSrc").src =
  `https://www.songsforchoirs.com/mp3/${slug}.mp3`;

audio.load();

    // Sheet link
    document.getElementById("sheetLink").href =
  `/sheet-${slug}.html`;

    // Cover image
    const cover = document.getElementById("coverImg");
    cover.src = `/images/Cover_png/${slug}.png`;
    cover.alt = `${TITLE} cover`;

    // Order button
    document.getElementById("orderBtn").onclick = () => {
      window.location.href = `orderform.html?title=${encoded}`;
    };
  </script>

</body>
</html>
