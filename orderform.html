<script>
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const titleParam = params.get("title");
  const titleField = document.getElementById("title");

  if (titleParam && titleField) {
    titleField.value = decodeURIComponent(titleParam);
    titleField.readOnly = true; // prevents tampering
  }

<script>
document.getElementById('orderForm').addEventListener('submit', function(e) {
  const title = document.getElementById('title').value.trim();
  const copies = parseInt(document.getElementById('copy').value) || 1;
  const pricePerCopy = 2.00;
  const total = (copies * pricePerCopy).toFixed(2);

  // Fill PayPal hidden inputs
  document.getElementById('paypalItemName').value = `${title} (${copies} copies)`;
  document.getElementById('paypalAmount').value = total;

  // Tiny delay to allow fields to update
  setTimeout(() => {
    e.target.submit();
  }, 100);
});
</script>

<script>
function generateOrderNumber() {
  const today = new Date();
  const y = today.getFullYear().toString().slice(-2);
  const m = (today.getMonth() + 1).toString().padStart(2, "0");
  const d = today.getDate().toString().padStart(2, "0");
  const r = Math.floor(Math.random() * 900 + 100);
  return `SFC-${y}${m}${d}-${r}`;
}

document.addEventListener("DOMContentLoaded", () => {

  // Autofill title from URL
  const params = new URLSearchParams(window.location.search);
  const titleParam = params.get("title");
  const titleField = document.getElementById("title");
  if (titleParam && titleField) {
    titleField.value = decodeURIComponent(titleParam);
    titleField.readOnly = true;
  }


  const orderField = document.getElementById("orderNum");
  const note = document.getElementById("batchNote");
  const emailField = document.getElementById("email");
  const replyTo = document.getElementById("replyTo");
  const totalField = document.getElementById("orderTotal");
  const priceDisplay = document.getElementById("priceDisplay");
  const copyField = document.getElementById("copy");

  // Fill order number immediately on load
  orderField.value = generateOrderNumber();

  // Keep _replyto synced with email
  emailField.addEventListener("input", (e) => {
    replyTo.value = e.target.value.trim();
  });

  // Calculate total and show live
  function calculateTotal(copies) {
    const remainder = copies % 3;
    const extra = remainder === 0 ? 0 : 3 - remainder;
    const totalCopies = copies + extra;
    const totalPrice = totalCopies * 1.25;
    return { totalPrice, extra, totalCopies };
  }

  copyField.addEventListener("input", () => {
    const val = parseInt(copyField.value, 10);
    if (isNaN(val) || val < 1) {
      note.style.display = "none";
      priceDisplay.textContent = "";
      totalField.value = "";
      return;
    }

    const { totalPrice, extra } = calculateTotal(val);

    if (extra === 0) {
      note.style.display = "none";
    } else {
      note.innerHTML = `Just so you know, we’ll need to add ${extra} extra cop${extra > 1 ? "ies" : "y"} to make it fit our batch system.<br>You can adjust your ‘number of copies’ if you prefer.`;
      note.style.display = "block";
    }

    priceDisplay.textContent = `Estimated total: £${totalPrice.toFixed(2)}`;
    totalField.value = `£${totalPrice.toFixed(2)}`;
  });

 
    


    // });
  });
});

<script>
document.getElementById("orderForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const title = document.getElementById("title").value.trim();
  const copies = parseInt(document.getElementById("copy").value) || 1;
  const pricePerCopy = 1.25;
  const total = (copies * pricePerCopy).toFixed(2);
  const orderNum = "SFC-" + Date.now().toString().slice(-6);

  // Fill PayPal hidden inputs
  document.getElementById("paypalItemName").value = `${title} (${copies} copies)`;
  document.getElementById("paypalAmount").value = total;

  // Build return URL with details
  const baseReturn = "https://www.songsforchoirs.com/receipt.html";
  const params = new URLSearchParams({
    title: title,
    copies: copies,
    price: total,
    order: orderNum
  });
  document.querySelector('input[name="return"]').value = `${baseReturn}?${params.toString()}`;

  // Submit the form to PayPal
  e.target.submit();
});
</script>
