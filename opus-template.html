<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- DATA -->
  <script src="data.js?v=1"></script>

  <script>
    const slug = "REPLACE_ME"; // slug = lowercase, hyphenated, no apostrophes

    const piece = (typeof PIECES !== "undefined") ? PIECES[slug] : null;

    if (piece && piece.voicing && piece.accompaniment) {
    piece.metaTitle = `${piece.title} - for ${piece.voicing} Choir with optional ${piece.accompaniment} | Songs for Choirs`;
  }   
    const TITLE = piece?.title || "TITLE";
    const DESCRIPTION = piece?.description || "";

    document.title = `${TITLE} – Songs for Choirs`;
  </script>

  <meta name="description" content="">

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", DESCRIPTION);
    });
  </script>

  <link rel="stylesheet" href="styles.css">

  <!-- Analytics -->
  <script defer data-domain="songsforchoirs.com" src="https://plausible.io/js/script.js"></script>
</head>

<body class="opus-page">

  <header class="site-header">
    <h1 class="site-logo">
      songs<span class="gold">for</span>choirs
    </h1>
    <p class="tagline">New accessible choral music.</p>
  </header>

  <nav id="site-nav" class="site-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="sacred.html">Sacred</a></li>
      <li><a href="concert.html">Concert</a></li>
      <li><a href="albums.html">Albums</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="wrap">
    <section class="panel">

      <div class="score-grid single-opus">
        
        <!-- Audio -->
        <div class="opus-left">
          <audio controls>
            <source id="audioSrc" type="audio/mpeg">
          </audio>
        </div>
        
        <!-- Cover -->
        <figure class="cover">
          <a id="sheetLink" class="cover-link">
            <img 
              id="coverImg"
              onerror="this.classList.add('placeholder'); this.src='images/placeholder.png';">
          </a>
          <span class="hover-tag">VIEW SAMPLE</span>
        </figure>

        <!-- Order -->
        <div class="opus-right">
          <div class="paypal-box">
            <button class="price"
              data-price="1.25"
              id="orderBtn"
              type="button">
              Order Here — £1.25 (<span class="eur"></span>, <span class="usd"></span>) per part
            </button>
          </div>
        </div>

      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>© 2026 <a href="https://www.songsforchoirs.com">www.songsforchoirs.com</a></small>
    </div>
  </footer>

  <script src="pricing.js"></script>

  <!-- WIRING -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const audio = document.querySelector("audio");

      document.getElementById("audioSrc").src =
        `https://www.songsforchoirs.com/mp3/${slug}.mp3`;
      audio.load();

      document.getElementById("sheetLink").href =
        `sheet-${slug}.html`;

      const cover = document.getElementById("coverImg");
      cover.src = `/images/Cover_png/${slug}.png`;
      cover.alt = `${TITLE} cover`;

      document.getElementById("orderBtn").onclick = () => {
      window.location.href = `orderform.html?title=${encodeURIComponent(TITLE)}`;
    };

    });
  </script>

</body>
</html>
