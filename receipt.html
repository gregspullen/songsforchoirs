<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Receipt — Songs for Choirs</title>
  <meta name="description" content="Receipt for your licensed choir score order from Songs for Choirs.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)),
                  url('images/Pearl_rays.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      text-align: center;
      color: #222;
      max-width: 600px;
      margin: 4em auto;
      padding: 3em;
      border-radius: 20px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.08);
    }
    h2 {
      color: #333;
      text-shadow: 0 1px 2px rgba(255,255,255,0.7);
      margin-bottom: 0.5em;
    }
    p {
      margin: 0.6em 0;
      font-size: 1.05em;
    }
    a.download-link {
      display: inline-block;
      margin-top: 1.5em;
      padding: 0.8em 1.4em;
      background: linear-gradient(to bottom, #fff, #f3f3f3);
      border-radius: 8px;
      border: 1px solid #ccc;
      text-decoration: none;
      color: #333;
      font-weight: 500;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1), inset 0 1px 2px rgba(255,255,255,0.9);
      transition: all 0.25s ease;
    }
    a.download-link:hover {
      background: linear-gradient(to bottom, #fff, #e8e8e8);
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <h2>Thank you for your order!</h2>

  <p><strong>Title:</strong> <span id="titleDisplay">—</span></p>
  <p><strong>Choir:</strong> <span id="choirDisplay">—</span></p>
  <p><strong>Order number:</strong> <span id="orderDisplay">—</span></p>
  <p><strong>Total:</strong> £<span id="priceDisplay">—</span></p>

  <a id="downloadLink" class="download-link" href="#">⬇️ Download your licensed PDF</a>

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const title = params.get("title") || "Unknown piece";
    const choir = params.get("choir") || "Unknown choir";
    const order = params.get("order") || "Unknown order";
    const price = params.get("price") || "—";

    document.getElementById("titleDisplay").textContent = title;
    document.getElementById("choirDisplay").textContent = choir;
    document.getElementById("orderDisplay").textContent = order;
    document.getElementById("priceDisplay").textContent = price;

    const safeTitle = title.replace(/\s+/g, "-");
    const copies = params.get("copies") || "?";

    // if you want to test the red overlay, set this to true
    const preview = true;

    const pdfUrl = `/scores/${safeTitle}.pdf?choir=${encodeURIComponent(choir)}&order=${encodeURIComponent(order)}&total=${encodeURIComponent(copies)}${preview ? "&preview=true" : ""}`;

    document.getElementById("downloadLink").href = pdfUrl;
  });
</script>


</body>
</html>
