<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("pieces-container");

  Object.keys(PIECES).forEach(slug => {
    const piece = PIECES[slug];

    // 🐸 THIS is the only new bit
    if (!piece.categories || !piece.categories.includes("sacred")) return;

    container.innerHTML += `
      <figure class="cover">
        <a href="opus-${slug}.html" class="cover-link">
          <div class="cover-image">
            <img
              src="images/Cover_png/${slug}.png"
              alt="${piece.title} cover"
              onerror="this.onerror=null; this.src='images/placeholder.png';">
          </div>
          <span class="hover-tag">Preview and Listen</span>
        </a>
      </figure>
    `;
  });

});
</script>
