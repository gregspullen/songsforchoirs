<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cover Generator</title>

<style>
  :root {
  --ray-color: rgba(255,220,0,0.28); /* default = gold */
}

body {
  margin: 0;
  background: #ddd;
}

/* === STAGE === */
.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: auto;
}

/* === PREVIEW SCALE === */
.preview {
  transform: scale(0.75);
  transform-origin: top center;
}

/* === COVER === */
.cover {
  width: 2480px;
  height: 3508px;
  background: white;   /* ← clean page */
  position: relative;
  font-family: "Georgia", serif;
  color: #222;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* === RAY BOX === */
.ray-box {
  position: absolute;
  top: 600px;
  left: 120px;
  width: 50%;
  height: 900px;   /* ← adjust this */

  background:
  linear-gradient(
      to bottom right,
      rgba(255,255,255,0) 10%,
      rgba(255,255,255,0.3) 25%,
      rgba(255,255,255,0.6) 45%,
      rgba(255,255,255,0.85) 65%,
      rgba(255,255,255,1) 85%
    ),
    repeating-conic-gradient(
      from 45deg at -10% 2%,
      rgba(255,255,255,0.65) 0deg 4deg,
      var(--ray-color) 4deg 12deg
    );

  z-index: 0;
}

/* === CONTENT === */
.content {
  position: relative;
  z-index: 1;

  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  margin-top: 770px;   /* ← your positioning control */
  margin-left: 120px;
}

/* === TEXT === */
.title,
.subtitle,
.composer,
.subcomposer {
  width: 100%;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 140px;
  line-height: 1.1;
  white-space: pre-line;
  margin-bottom: 120px;
}

/* SUBTITLE */
.subtitle {
  font-size: 70px;
  font-style: italic;
  line-height: 1.3;
  white-space: pre-line;
  margin-bottom: 400px;
}

/* COMPOSER */
.composer {
  font-size: 70px;
  font-style: italic;
}

/* SUBCOMPOSER */
.subcomposer {
  font-size: 60px;
  font-style: italic;
  margin-top: 10px;
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 80px;
  font-size: 40px;
  color: #666;
}

</style>
</head>

<body>

<div class="stage">
  <div class="preview">

    <div class="cover">

      <div class="ray-box"></div>

      <div class="content">
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>
        <div class="composer" id="composer"></div>
        <div class="subcomposer" id="subcomposer"></div>
      </div>

      <div class="footer" id="cp"></div>

    </div>

  </div>
</div>

<script>
const data = PIECES["away-in-a-manger"];
if (!data) console.error("Piece not found");
document.documentElement.style.setProperty(
  "--ray-color",
  data.color
);

document.getElementById("title").textContent = data.title;
document.getElementById("subtitle").textContent = data.subtitle;
document.getElementById("composer").textContent = data.composer;
document.getElementById("subcomposer").textContent = data.subcomposer;
document.getElementById("cp").textContent = data.cp;
</script>

</body>
</html>
