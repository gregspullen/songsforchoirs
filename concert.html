<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("pieces-container");

  Object.keys(PIECES).forEach(slug => {
    const piece = PIECES[slug];

   if (!piece.categories || !piece.categories.includes("concert")) return;

    container.innerHTML += `
      <figure class="cover">
        <a href="${piece.link || `opus-${slug}.html`}" class="cover-link">
          <div class="cover-image">
            <img
              src="images/Cover_png/${slug}.png"
              alt="${piece.title} cover"
              onerror="this.onerror=null; this.src='images/placeholder.png';">
          </div>
          <span class="hover-tag">Preview • Listen • Buy</span>
        </a>
      </figure>
    `;
  });

  // after the forEach finishes
container.innerHTML += `
  <figure class="cover">
    <a href="opus-your-monster-is-your-friend.html" class="cover-link">
      <div class="cover-image">
        <img
          src="images/Cover_png/your-monster-is-your-friend.png"
          alt="Your Monster Is Your Friend cover"
          onerror="this.onerror=null; this.src='images/placeholder.png';">
      </div>
      <span class="hover-tag">Free video</span>
    </a>
  </figure>
`;


// ===== Scroll arrows =====

const leftArrow = document.getElementById("scroll-left");
const rightArrow = document.getElementById("scroll-right");

const firstCover = container.querySelector(".cover");

if (leftArrow && rightArrow && firstCover) {

    function updateArrows() {

  leftArrow.classList.toggle(
      "disabled",
      container.scrollLeft <= 2
  );

  rightArrow.classList.toggle(
      "disabled",
      container.scrollLeft >=
      container.scrollWidth - container.clientWidth - 2
  );

  }

    const step = firstCover.offsetWidth;

    leftArrow.addEventListener("click", () => {
        container.scrollBy({
            left: -step,
            behavior: "smooth"
        });
    });

    rightArrow.addEventListener("click", () => {
        container.scrollBy({
            left: step,
            behavior: "smooth"
        });
    });

    container.addEventListener("scroll", updateArrows);
    updateArrows();

}

});

</script>
