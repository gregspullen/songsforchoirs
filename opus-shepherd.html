<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lord Is My Shepherd — Songs for Choirs</title>
  <meta name="description" content="The Lord Is My Shepherd — SATB choir & piano." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="images/favicon.png?v=7" sizes="32x32" type="image/png" />
  <link rel="stylesheet" href="styles.css?v=18" />

  <style>
    .score-wrapper {
      text-align: center;
    }
    .score-cover {
      max-width: 340px;
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      display: block;
      margin: 0 auto 1rem;
    }
    .score-controls {
      display: flex;
      gap: .6rem;
      justify-content: center;
      margin-top: .65rem;
    }
    .score-controls button,
    .score-controls a.button-like {
      flex: 0 0 auto;
      padding: .55rem 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .score-controls .play,
    .score-controls .buy {
      background: #f7f3e6;
      border-color: #e6d8ad;
      color: goldenrod;
    }
    .sample-link {
      margin-top: 1rem;
    }
  </style>
  
  <!-- PayPal SDK (Part 1) -->

</head>
<body class="opus">
  <header class="site-header">
    <div class="wrap">
      <h1>The Lord Is My Shepherd</h1>
      <p class="tag">SATB choir &amp; piano — listen &amp; preview.</p>
    </div>
  </header>

  <nav id="site-nav" class="site-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="choral.html">Choral</a></li>
      <li><a href="children.html">Children</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="wrap">
    <section class="panel">
      <div class="score-wrapper">
        
        
        <div class="opus-layout">
          <div class="opus-left">
            <!-- Small audio player -->
            <audio controls>
              <source src="mp3/Shepherd.mp3" type="audio/mpeg">
              Your browser does not support the audio element.
            </audio>
          </div>
        
          <div class="opus-center">
            <!-- Cover -->
            <a href="sheet-shepherd.html">
              <img src="images/Cover_png/The-Lord-Is-My-Shepherd.png" 
                   alt="The Lord Is My Shepherd cover"
                   class="score-cover">
            </a>
            
            <p><a href="sheet-shepherd.html">View sample pages of the score</a></p>
          </div>
        
          <div class="opus-right">
            <p style="margin-bottom: 8px; font-weight: 600; color: goldenrod;">
              Price: £2.75 each
            </p>
            <!-- PayPal Single Button -->
            <form action="https://www.paypal.com/ncp/payment/4AQFXBWL43RHL" method="post" target="_top">
              <input type="submit" value="Buy Now" class="paypal-button" />
              <img src="https://www.paypalobjects.com/images/Debit_Credit_APM.svg" 
                   alt="Cards accepted" style="margin-top: 8px; max-width: 120px;">
            </form>
          </div>
          
          
        </div>
          
        
        

        <!-- Restored preview link -->
        
        </p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small>© <span id="year"></span> Songs for Choirs. All rights reserved.</small>
    </div>
  </footer>

  <!-- Hidden audio -->
  <audio id="audio" src="mp3/Shepherd.mp3"></audio>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const playBtn = document.getElementById('play-btn');
    const audio = document.getElementById('audio');

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.currentTime = 0;
        audio.play();
        playBtn.textContent = "■ Stop";
      } else {
        audio.pause();
        audio.currentTime = 0;
        playBtn.textContent = "▶︎ Play";
      }
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = "▶︎ Play";
    });
  </script>
</body>
</html>
