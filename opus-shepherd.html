<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lord Is My Shepherd — Songs for Choirs</title>
  <meta name="description" content="The Lord Is My Shepherd — SATB choir & piano." />
  <meta name="theme-color" content="#ffffff" />

  <link rel="icon" href="images/favicon.png" sizes="32x32" type="image/png">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="styles.css?v=14">

  <style>
    .score-wrapper {
      text-align: center;
    }
    .score-cover {
      max-width: 340px;
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      display: block;
      margin: 0 auto 1rem;
    }
    .score-controls {
      display: flex;
      gap: .6rem;
      justify-content: center;
      margin-top: .65rem;
    }
    .score-controls button,
    .score-controls a.button-like {
      flex: 0 0 auto;
      padding: .55rem 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .score-controls .play,
    .score-controls .buy {
      background: #f7f3e6;
      border-color: #e6d8ad;
      color: goldenrod;
    }
    .sample-link {
      margin-top: 1rem;
    }
  </style>
</head>

<body class="opus-page">
  <header class="site-header">
    <h1 class="site-logo">
      songs<span class="gold">for</span>choirs
    </h1>
    <p class="tagline">New accessible choral music.</p>
  </header>

  <nav id="site-nav" class="site-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="choral.html">Choral</a></li>
      <li><a href="children.html">Children</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>


  <main class="wrap">
  <section class="panel">
    <div class="score-wrapper">

      <div class="opus-layout">

        <!-- Left: small audio player -->
        <div class="opus-left">
          <audio controls>
            <source src="mp3/Shepherd.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
        </div>

        <!-- Centre: cover image -->
        <div class="opus-center">
          <div class="cover-wrap">
            <a href="sheet-shepherd.html">
              <img src="images/Cover_png/The-Lord-Is-My-Shepherd.png"
                   alt="The Lord Is My Shepherd cover"
                   class="score-cover">
              <span class="sample-hover">View Sample</span>
            </a>
          </div>
        </div>

        <!-- Right: order button -->
        <div class="opus-right">
          <div class="paypal-box">
            <button class="price" data-price="1.25"
              onclick="window.location.href='orderform.html?title=The%20Lord%20Is%20My%20Shepherd'">
              Order Here — £1.25 per part
            </button>
          </div>
        </div>

      </div> <!-- end opus-layout -->

    </div> <!-- end score-wrapper -->
  </section>
</main>


  <footer class="site-footer">
    <div class="wrap">
      <small>© 2025 <a href="https://www.songsforchoirs.com">www.songsforchoirs.com</a> — All rights reserved worldwide.</small>
    </div>
  </footer>

  <!-- Hidden audio -->
  <audio id="audio" src="mp3/Shepherd.mp3"></audio>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const playBtn = document.getElementById('play-btn');
    const audio = document.getElementById('audio');

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.currentTime = 0;
        audio.play();
        playBtn.textContent = "■ Stop";
      } else {
        audio.pause();
        audio.currentTime = 0;
        playBtn.textContent = "▶︎ Play";
      }
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = "▶︎ Play";
    });
  </script>
  <script src="pricing.js"></script>
</body>
</html>
