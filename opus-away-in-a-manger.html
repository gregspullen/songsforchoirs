  <script>
document.addEventListener("DOMContentLoaded", () => {

  const path = window.location.pathname;

  const slug = path
    .split("/")
    .pop()
    .replace(/^opus-/, "")
    .replace(/\.html$/, "");

  const piece = (typeof PIECES !== "undefined") ? PIECES[slug] : null;

  if (!piece) {
    console.error("Piece not found:", slug);
    return;
  }

  const price = piece.price ?? 1.00;

  const copyInput = document.getElementById("copyInput");
  const eurSpan = document.querySelector(".eur");
  const usdSpan = document.querySelector(".usd");

  if (eurSpan && usdSpan) {
    eurSpan.textContent = `€${(price * 1.17).toFixed(2)}`;
    usdSpan.textContent = `$${(price * 1.27).toFixed(2)}`;
  }

  // --------------------------------------------------
  // SEO
  // --------------------------------------------------

  document.title = piece.metaTitle || `${piece.title} | Songs for Choirs`;
  document.getElementById("page-tagline").textContent = piece.title;

  const description =
    piece.description ||
    "Affordable original choral music by Lyra Harker, available as instant PDF downloads.";

  document
    .querySelector('meta[name="description"]')
    ?.setAttribute("content", description);

  const canonical =
    "https://songsforchoirs.com" + window.location.pathname;

  document
    .querySelector('link[rel="canonical"]')
    ?.setAttribute("href", canonical);

  const coverImage =
    `https://songsforchoirs.com/images/Cover_png/${slug}.png`;

  document
    .querySelector('meta[property="og:title"]')
    ?.setAttribute("content", document.title);

  document
    .querySelector('meta[property="og:description"]')
    ?.setAttribute("content", description);

  document
    .querySelector('meta[property="og:image"]')
    ?.setAttribute("content", coverImage);

  document
    .querySelector('meta[property="og:url"]')
    ?.setAttribute("content", canonical);

  document
    .querySelector('meta[name="twitter:title"]')
    ?.setAttribute("content", document.title);

  document
    .querySelector('meta[name="twitter:description"]')
    ?.setAttribute("content", description);

  document
    .querySelector('meta[name="twitter:image"]')
    ?.setAttribute("content", coverImage);

  // --------------------------------------------------
  // Cover
  // --------------------------------------------------

  const cover = document.getElementById("coverImg");

  if (cover) {
    cover.src = `/images/Cover_png/${slug}.png`;
    cover.alt = `${piece.title} cover`;
  }

  // --------------------------------------------------
  // Preview score link
  // --------------------------------------------------

  const sheetLink = document.getElementById("sheetLink");

  if (sheetLink) {
    sheetLink.href = `sheet-${slug}.html`;
  }

  // --------------------------------------------------
  // Audio
  // --------------------------------------------------

  const audio = document.querySelector("audio");
  const audioSrc = document.getElementById("audioSrc");

  if (audio && audioSrc) {
    audioSrc.src = `/mp3/${slug}.mp3`;
    audio.load();
  }

  // --------------------------------------------------
  // Price display
  // --------------------------------------------------

  const priceDisplayBtn = document.getElementById("priceDisplayBtn");

  if (priceDisplayBtn) {
    priceDisplayBtn.textContent = price.toFixed(2);
  }

  // --------------------------------------------------
  // Price calculator
  // --------------------------------------------------

  const totalGBP = document.getElementById("totalGBP");
  const totalEUR = document.getElementById("totalEUR");
  const totalUSD = document.getElementById("totalUSD");

  function updateTotal() {

    const copies = Math.max(
      1,
      parseInt(copyInput.value || "1", 10)
    );

    let total = Math.min(copies, 10) * price;

    if (copies > 10)
      total += Math.min(copies - 10, 10) * price * 0.67;

    if (copies > 20)
      total += Math.min(copies - 20, 10) * price * 0.58;

    if (copies > 30)
      total += Math.min(copies - 30, 10) * price * 0.50;

    if (copies > 40)
      total += Math.min(copies - 40, 10) * price * 0.42;

    if (copies > 50)
      total += Math.min(copies - 50, 10) * price * 0.33;

    if (copies > 60)
      total += Math.min(copies - 60, 10) * price * 0.25;

    if (copies > 70)
      total += Math.min(copies - 70, 10) * price * 0.17;

    if (copies > 80)
      total += Math.min(copies - 80, 10) * price * 0.08;

    if (copies > 90)
      total += Math.min(copies - 90, 10) * price * 0.04;

    if (copies > 100)
      total += (copies - 100) * price * 0.01;

    const perPart = total / copies;

    document.getElementById("pricePerPart").textContent =
      perPart.toFixed(2);

    if (totalGBP) totalGBP.textContent = total.toFixed(2);
    if (totalEUR) totalEUR.textContent = `€${(total * 1.17).toFixed(2)}`;
    if (totalUSD) totalUSD.textContent = `$${(total * 1.27).toFixed(2)}`;

    const patronPrice = document.getElementById("patronPrice");

    if (patronPrice)
      patronPrice.textContent =
        `Patrons pay £${(total / 2).toFixed(2)}`;
  }

  if (copyInput) {
    ["input", "change"].forEach(event =>
      copyInput.addEventListener(event, updateTotal)
    );

    updateTotal();
  }

  // --------------------------------------------------
  // Order button
  // --------------------------------------------------

  const orderBtn = document.getElementById("orderBtn");

  if (orderBtn) {

    orderBtn.onclick = () => {

      const copies =
        copyInput ? copyInput.value : 12;

      window.location.href =
        `orderform.html?title=${encodeURIComponent(piece.title)}&price=${price}&copies=${copies}`;

    };

  }

});
  </script>

  <script>
    const path = window.location.pathname;
    const slug = path.split("/").pop()
      .replace("opus-", "")
      .replace(".html", "");
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

let currentPage = 0;
const img = document.getElementById("opus-preview-page");
const hover = document.querySelector(".hover-tag");

img.src = `images/Cover_png/${slug}.png`;
      const piece = PIECES[slug];

      // ===== FROM THE COMPOSER =====

      if (piece.fromComposer) {

      const panel = document.getElementById("fromComposer");

      panel.innerHTML = `
          <h3>...from the composer</h3>
          <p>${piece.fromComposer}</p>
      `;
      }

      if (piece.atAGlance) {

        const panel = document.getElementById("atAGlance");

        let html = "<h3>At a glance</h3>";

        piece.atAGlance.forEach(item => {

            html += `
                <div class="glance-row">
                    <span class="glance-label">${item.label}</span>
                    <span class="glance-value">${item.value}</span>
                </div>
            `;

        });

        panel.innerHTML = html;
      }

const inSets = Object.keys(PIECES).filter(s => {
  const p = PIECES[s];
  return p.type === "bundle" && p.pieces && p.pieces.includes(slug);
});

if (inSets.length) {
  const box = document.createElement("div");
  box.className = "available-in-sets";
  box.style.marginTop = "-5px";
  box.innerHTML = "<strong>Available in these sets:</strong>";

  const ul = document.createElement("ul");

  inSets.forEach(s => {
    const li = document.createElement("li");
    const link = document.createElement("a");

    link.href = `set-${s}.html`;
    link.textContent = PIECES[s].title;

    li.appendChild(link);
    ul.appendChild(li);
  });

 box.appendChild(ul);
 document.getElementById("availableInSets").appendChild(box);
}

if (!piece.hasScore) {
  img.src = `images/Cover_png/${slug}.png`;
  hover.textContent = "Preview not yet available";
  img.style.cursor = "default";

  // STOP everything else from running
  return;
}

// 🐸 NEW: detect first available page automatically
let basePage = 1;

function findFirstPage(callback) {
  let i = 1;

  function check() {
    const test = new Image();
    const filename = `preview_images/${slug}/${slug}_${String(i).padStart(4, '0')}.png`;

    test.onload = () => {
      basePage = i;
      callback();
    };

    test.onerror = () => {
      i++;
      if (i < 10) {
        check(); // try next
      } else {
        basePage = 1;
        callback();
      }
    };

    test.src = filename;
  }

  check();
}

function goToPage(n) {
  const realPage = basePage + (n - 1);
  const test = new Image();

  const filename = `preview_images/${slug}/${slug}_${String(realPage).padStart(4, '0')}.png`;

  test.onload = () => {
  currentPage = n;
  img.src = filename;
  hover.style.display = "none";

  const footer = document.querySelector(".preview-footer");

  if (footer) {
      footer.style.display = "block";
  }
};

  test.onerror = () => {
    currentPage = 1;
    img.src = `preview_images/${slug}/${slug}_${String(basePage).padStart(4, '0')}.png`;
  };

  test.src = filename;
}

findFirstPage(() => {
  img.addEventListener("click", () => {
    goToPage(currentPage + 1);
  });
});

});
    </script>
